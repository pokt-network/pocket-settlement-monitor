name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Go vet
        run: go vet ./...
      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - uses: golangci/golangci-lint-action@v8

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build release binary
        run: make build-release
      - name: Verify binary
        run: ./bin/pocket-settlement-monitor version
      - name: Run tests
        run: make test
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pocket-settlement-monitor
          path: bin/pocket-settlement-monitor

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set build variables
        id: vars
        run: |
          echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ steps.vars.outputs.version }} \
            --build-arg COMMIT=${{ steps.vars.outputs.commit }} \
            --build-arg BUILD_DATE=${{ steps.vars.outputs.build_date }} \
            -t pocket-settlement-monitor:${{ steps.vars.outputs.version }} .
      - name: Verify Docker image
        run: docker run --rm pocket-settlement-monitor:${{ steps.vars.outputs.version }} pocket-settlement-monitor version
