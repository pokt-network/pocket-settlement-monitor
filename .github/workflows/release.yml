name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Go vet
        run: go vet ./...
      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - uses: golangci/golangci-lint-action@v8

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build release binary
        run: make build-release
      - name: Verify binary
        run: ./bin/pocket-settlement-monitor version
      - name: Run tests
        run: make test

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set build variables
        id: vars
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              echo "Building ${os}/${arch}..."
              CGO_ENABLED=0 GOOS=${os} GOARCH=${arch} go build -trimpath \
                -ldflags "-s -w \
                  -X github.com/pokt-network/pocket-settlement-monitor/internal/version.Version=${{ steps.vars.outputs.version }} \
                  -X github.com/pokt-network/pocket-settlement-monitor/internal/version.Commit=${{ steps.vars.outputs.commit }} \
                  -X github.com/pokt-network/pocket-settlement-monitor/internal/version.BuildDate=${{ steps.vars.outputs.build_date }}" \
                -o dist/pocket-settlement-monitor-${os}-${arch} .
            done
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum pocket-settlement-monitor-* > checksums.txt
          cat checksums.txt

      - name: Build and push Docker image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          IMAGE=ghcr.io/${{ github.repository }}
          docker build \
            --build-arg VERSION=${{ steps.vars.outputs.version }} \
            --build-arg COMMIT=${{ steps.vars.outputs.commit }} \
            --build-arg BUILD_DATE=${{ steps.vars.outputs.build_date }} \
            -t ${IMAGE}:${{ steps.vars.outputs.version }} \
            -t ${IMAGE}:latest .
          docker push ${IMAGE}:${{ steps.vars.outputs.version }}
          docker push ${IMAGE}:latest

      - name: Verify Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker run --rm ${IMAGE}:${{ steps.vars.outputs.version }} pocket-settlement-monitor version

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Compose release body
        id: release_body
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository }}"
          CHANGELOG="${{ steps.changelog.outputs.content }}"

          cat > release-body.md << BODY_EOF
          ## What's Changed

          ${CHANGELOG}

          ## Binaries

          | Platform | Architecture | Binary |
          |----------|-------------|--------|
          | Linux | amd64 | \`pocket-settlement-monitor-linux-amd64\` |
          | Linux | arm64 | \`pocket-settlement-monitor-linux-arm64\` |
          | macOS | amd64 | \`pocket-settlement-monitor-darwin-amd64\` |
          | macOS | arm64 | \`pocket-settlement-monitor-darwin-arm64\` |

          Verify with checksums:
          \`\`\`bash
          sha256sum -c checksums.txt
          \`\`\`

          ## Docker

          \`\`\`bash
          docker pull ${IMAGE}:${VERSION}
          \`\`\`

          Also available as:
          \`\`\`bash
          docker pull ${IMAGE}:latest
          \`\`\`

          Run:
          \`\`\`bash
          docker run --rm -v \$(pwd)/config.yaml:/config.yaml ${IMAGE}:${VERSION} monitor --config /config.yaml
          \`\`\`
          BODY_EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: dist/*
