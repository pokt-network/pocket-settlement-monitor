global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yaml

scrape_configs:
  - job_name: pocket-settlement-monitor
    static_configs:
      - targets:
          - "monitor:9090"
        labels:
          instance: psm-dev
    metrics_path: /metrics
    scrape_interval: 5s
