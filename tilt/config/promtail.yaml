server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape containers on the psm-network
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        target_label: container
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
    pipeline_stages:
      # Parse zerolog JSON output
      - json:
          expressions:
            level: level
            component: component
            msg: message
            caller: caller
      - labels:
          level:
          component:
      - timestamp:
          source: time
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05Z07:00"
