services:
  # --- Settlement Monitor ---
  monitor:
    image: pocket-settlement-monitor:local
    volumes:
      - ../.tilt/.generated-config.yaml:/etc/psm/config.yaml:ro
      - psm-data:/home/psm  # Mount into psm user's home (writable without root)
    ports:
      - "${MONITOR_METRICS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - psm-network
    restart: unless-stopped

  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./config/alert-rules.yaml:/etc/prometheus/alert-rules.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    networks:
      - psm-network
    depends_on:
      monitor:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - observability

  # --- Grafana ---
  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/settlement-monitor.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - psm-network
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - observability

  # --- Loki ---
  loki:
    image: grafana/loki:3.3.0
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./config/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - psm-network
    restart: unless-stopped
    profiles:
      - loki

  # --- Promtail ---
  promtail:
    image: grafana/promtail:3.3.0
    command: -config.file=/etc/promtail/promtail.yaml
    volumes:
      - ./config/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - psm-network
    depends_on:
      - loki
    restart: unless-stopped
    profiles:
      - loki

  # --- Mock Discord Webhook ---
  mock-webhook:
    image: psm-mock-webhook:local
    ports:
      - "${MOCK_WEBHOOK_PORT:-8888}:8888"
    networks:
      - psm-network
    restart: unless-stopped
    profiles:
      - mock-webhook

volumes:
  psm-data:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  psm-network:
    driver: bridge
